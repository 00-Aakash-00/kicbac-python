{
  "openapi": "3.1.0",
  "info": {
    "title": "Kicbac Payment API",
    "version": "2026-06-12",
    "description": "Form-encoded Kicbac Payment API, Kicbac.js tokenized payment fields, reporting API, and webhook delivery contracts."
  },
  "servers": [
    {
      "url": "https://kicbac.transactiongateway.com",
      "description": "Kicbac gateway"
    }
  ],
  "tags": [
    {
      "name": "Payment API",
      "description": "Form-encoded transaction, vault, recurring, and invoice operations."
    },
    {
      "name": "Query API",
      "description": "Form-encoded reporting and lookup endpoint."
    },
    {
      "name": "Webhooks",
      "description": "HTTPS event deliveries signed with Webhook-Signature."
    }
  ],
  "paths": {
    "/api/transact.php": {
      "post": {
        "tags": [
          "Payment API"
        ],
        "operationId": "submitTransaction",
        "summary": "Submit a gateway operation",
        "description": "Use this endpoint for sales, authorizations, captures, voids, refunds, Customer Vault operations, recurring plans/subscriptions, and invoices. Tokenize browser payment details with Kicbac.js and send payment_token; do not post raw PAN/CVV from merchant servers.",
        "requestBody": {
          "required": true,
          "content": {
            "application/x-www-form-urlencoded": {
              "schema": {
                "$ref": "#/components/schemas/TransactRequest"
              },
              "examples": {
                "saleWithPaymentToken": {
                  "summary": "Card sale with a Kicbac test token",
                  "value": {
                    "security_key": "test_security_key",
                    "type": "sale",
                    "amount": "49.99",
                    "payment_token": "00000000-000000-000000-000000000000",
                    "orderid": "order_1001"
                  }
                },
                "achSaleWithPaymentToken": {
                  "summary": "ACH sale with a Kicbac test token",
                  "value": {
                    "security_key": "test_security_key",
                    "type": "sale",
                    "payment": "check",
                    "amount": "19.99",
                    "payment_token": "11111111-111111-111111-111111111111",
                    "orderid": "ach_order_1001"
                  }
                },
                "followUpMitCharge": {
                  "summary": "Follow-up merchant-initiated stored credential charge",
                  "value": {
                    "security_key": "test_security_key",
                    "type": "sale",
                    "amount": "9.99",
                    "customer_vault_id": "123456789",
                    "initiated_by": "merchant",
                    "stored_credential_indicator": "used",
                    "initial_transaction_id": "9876543210"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Gateway operation result. HTTP 200 does not mean approved; inspect response. response=1 is approved, response=2 is a typed decline result, response=3 is a gateway/processor error.",
            "content": {
              "application/x-www-form-urlencoded": {
                "schema": {
                  "$ref": "#/components/schemas/GatewayResponse"
                },
                "examples": {
                  "approved": {
                    "value": {
                      "response": "1",
                      "responsetext": "SUCCESS",
                      "authcode": "123456",
                      "transactionid": "1234560000",
                      "response_code": "100"
                    }
                  },
                  "declined": {
                    "value": {
                      "response": "2",
                      "responsetext": "DECLINE",
                      "transactionid": "1234560001",
                      "response_code": "200"
                    }
                  },
                  "error": {
                    "value": {
                      "response": "3",
                      "responsetext": "Rate limit exceeded",
                      "response_code": "301"
                    }
                  }
                }
              },
              "text/plain": {
                "schema": {
                  "type": "string"
                },
                "examples": {
                  "approved": {
                    "value": "response=1&responsetext=SUCCESS&authcode=123456&transactionid=1234560000&response_code=100"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/query.php": {
      "post": {
        "tags": [
          "Query API"
        ],
        "operationId": "queryGateway",
        "summary": "Query transactions and reports",
        "description": "Query reporting data, transactions, Customer Vault records, recurring records, invoice records, profile information, and test-mode status. This endpoint is safe for SDK retry logic; transact.php POSTs are not.",
        "requestBody": {
          "required": true,
          "content": {
            "application/x-www-form-urlencoded": {
              "schema": {
                "$ref": "#/components/schemas/QueryRequest"
              },
              "examples": {
                "transactionByOrder": {
                  "value": {
                    "security_key": "test_security_key",
                    "order_id": "order_1001"
                  }
                },
                "testModeStatus": {
                  "value": {
                    "security_key": "test_security_key",
                    "report_type": "test_mode_status"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "XML query response.",
            "content": {
              "application/xml": {
                "schema": {
                  "type": "string"
                },
                "examples": {
                  "transaction": {
                    "value": "<nm_response><transaction><transaction_id>1234560000</transaction_id><condition>pendingsettlement</condition></transaction></nm_response>"
                  }
                }
              },
              "text/xml": {
                "schema": {
                  "type": "string"
                }
              }
            }
          }
        }
      }
    }
  },
