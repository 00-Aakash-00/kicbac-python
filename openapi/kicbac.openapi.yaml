  "components": {
    "parameters": {
      "WebhookSignature": {
        "name": "Webhook-Signature",
        "in": "header",
        "required": true,
        "schema": {
          "type": "string",
          "pattern": "^t=[^,]+,s=[A-Fa-f0-9]{64}$",
          "examples": [
            "t=a1b2c3d4e5f60718,s=48414960bf65c35db74773135fc0ba87daab35395dbefca4f4df2a25ea651759"
          ]
        },
        "description": "Signature header. Verify HMAC-SHA256(signingKey, nonce + '.' + rawBody) where nonce is t and signature is s."
      }
    },
    "schemas": {
      "TransactRequest": {
        "type": "object",
        "additionalProperties": {
          "type": "string",
          "description": "Gateway supports additional documented processor and Level II/III fields."
        },
        "required": [
          "security_key"
        ],
        "properties": {
          "security_key": {
            "type": "string",
            "description": "Private gateway security key. Never expose this value in browser code."
          },
          "type": {
            "type": "string",
            "description": "Transaction operation type.",
            "enum": [
              "sale",
              "auth",
              "credit",
              "validate",
              "offline",
              "capture",
              "void",
              "refund",
              "update"
            ]
          },
          "payment": {
            "type": "string",
            "description": "Payment rail selector.",
            "enum": [
              "creditcard",
              "check",
              "cash",
              ""
            ]
          },
          "amount": {
            "type": "string",
            "pattern": "^\\d+(\\.\\d{2})$",
            "examples": [
              "49.99"
            ],
            "description": "Decimal amount in major currency units."
          },
          "payment_token": {
            "type": "string",
            "description": "Single-use Kicbac payment token. Preferred for card and ACH payments.",
            "examples": [
              "00000000-000000-000000-000000000000",
              "11111111-111111-111111-111111111111"
            ]
          },
          "customer_vault_id": {
            "type": "string",
            "description": "Customer Vault customer identifier."
          },
          "customer_vault": {
            "type": "string",
            "description": "Customer Vault operation.",
            "enum": [
              "add_customer",
              "update_customer",
              "delete_customer",
              ""
            ]
          },
          "billing_id": {
            "type": "string",
            "description": "Customer Vault billing record identifier."
          },
          "source_transaction_id": {
            "type": "string",
            "description": "Transaction ID to copy card data or vault a previous payment."
          },
          "transactionid": {
            "type": "string",
            "description": "Existing transaction ID for capture, void, refund, or update."
          },
          "authorization_code": {
            "type": "string",
            "description": "Authorization code for offline transactions."
          },
          "dup_seconds": {
            "type": "string",
            "description": "Gateway duplicate window in seconds."
          },
          "currency": {
            "type": "string",
            "description": "Currency code.",
            "examples": [
              "USD"
            ]
          },
          "orderid": {
            "type": "string",
            "description": "Merchant order ID."
          },
          "order_description": {
            "type": "string",
            "description": "Order description."
          },
          "ponumber": {
            "type": "string",
            "description": "Purchase order number."
          },
          "first_name": {
            "type": "string",
            "description": "Billing first name."
          },
          "last_name": {
            "type": "string",
            "description": "Billing last name."
          },
          "address1": {
            "type": "string",
            "description": "Billing address line 1."
          },
          "address2": {
            "type": "string",
            "description": "Billing address line 2."
          },
          "city": {
            "type": "string",
            "description": "Billing city."
          },
          "state": {
            "type": "string",
            "description": "Billing state."
          },
          "zip": {
            "type": "string",
            "description": "Billing ZIP/postal code."
          },
          "country": {
            "type": "string",
            "description": "Billing country."
          },
          "email": {
            "type": "string",
            "description": "Billing email."
          },
          "phone": {
            "type": "string",
            "description": "Billing phone."
          },
          "shipping_firstname": {
            "type": "string",
            "description": "Shipping first name."
          },
          "shipping_lastname": {
            "type": "string",
            "description": "Shipping last name."
          },
          "shipping_address1": {
            "type": "string",
            "description": "Shipping address line 1."
          },
          "shipping_address2": {
            "type": "string",
            "description": "Shipping address line 2."
          },
          "shipping_city": {
            "type": "string",
            "description": "Shipping city."
          },
          "shipping_state": {
            "type": "string",
            "description": "Shipping state."
          },
          "shipping_zip": {
            "type": "string",
            "description": "Shipping ZIP/postal code."
          },
          "shipping_country": {
            "type": "string",
            "description": "Shipping country."
          },
          "checkaba": {
            "type": "string",
            "description": "ACH routing number. Prefer Kicbac.js ACH tokens when collecting in browser."
          },
          "checkaccount": {
            "type": "string",
            "description": "ACH account number. Prefer Kicbac.js ACH tokens when collecting in browser."
          },
          "checkname": {
            "type": "string",
            "description": "ACH account holder name."
          },
          "account_holder_type": {
            "type": "string",
            "description": "ACH account holder type.",
            "enum": [
              "personal",
              "business",
              ""
            ]
          },
          "account_type": {
            "type": "string",
            "description": "ACH account type.",
            "enum": [
              "checking",
              "savings",
              ""
            ]
          },
          "sec_code": {
            "type": "string",
            "description": "ACH SEC code.",
            "examples": [
              "WEB"
            ]
